<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI & Linux Practicals</title>
    <meta name="description" content="Download AI and Linux Practical files.">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f172a;
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --card-bg: rgba(30, 41, 59, 0.7);
            --card-border: rgba(255, 255, 255, 0.1);
            --card-hover-border: rgba(255, 255, 255, 0.25);
            --primary-accent: #3b82f6;
            --secondary-accent: #8b5cf6;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        /* Abstract background orbs */
        .bg-orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(100px);
            z-index: -1;
            animation: float 20s infinite ease-in-out alternate;
        }

        .orb-1 {
            width: 400px;
            height: 400px;
            background: rgba(59, 130, 246, 0.15);
            top: -100px;
            left: -100px;
        }

        .orb-2 {
            width: 500px;
            height: 500px;
            background: rgba(139, 92, 246, 0.15);
            bottom: -100px;
            right: -100px;
            animation-delay: -10s;
        }

        @keyframes float {
            0% { transform: translate(0, 0); }
            100% { transform: translate(50px, 50px); }
        }

        main {
            max-width: 1200px;
            margin: 0 auto;
            padding: 4rem 2rem;
        }

        header {
            text-align: center;
            margin-bottom: 4rem;
        }

        h1 {
            font-size: 3.5rem;
            font-weight: 700;
            margin-bottom: 1rem;
            background: linear-gradient(to right, #60a5fa, #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -1px;
        }

        p {
            color: var(--text-secondary);
            font-size: 1.125rem;
        }

        .search-container {
            max-width: 600px;
            margin: 0 auto 3rem auto;
            position: relative;
        }

        .search-input {
            width: 100%;
            padding: 1rem 1.5rem 1rem 3rem;
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid var(--card-border);
            border-radius: 999px;
            color: var(--text-primary);
            font-size: 1rem;
            outline: none;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
        }

        .search-input:focus {
            border-color: var(--primary-accent);
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1);
        }

        .search-icon {
            position: absolute;
            left: 1.2rem;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-secondary);
        }

        .tabs {
            display: flex;
            justify-content: center;
            gap: 1rem;
            margin-bottom: 3rem;
        }

        .tab-btn {
            background: rgba(30, 41, 59, 0.5);
            border: 1px solid var(--card-border);
            padding: 0.75rem 2rem;
            border-radius: 999px;
            color: var(--text-secondary);
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
        }

        .tab-btn:hover {
            border-color: var(--card-hover-border);
            color: var(--text-primary);
        }

        .tab-btn.active {
            background: var(--primary-accent);
            color: white;
            border-color: var(--primary-accent);
            box-shadow: 0 4px 15px rgba(59, 130, 246, 0.3);
        }

        .tab-content {
            display: none;
            animation: fadeIn 0.5s ease;
        }

        .tab-content.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1.5rem;
        }

        .card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 16px;
            padding: 1.5rem;
            display: flex;
            align-items: center;
            gap: 1.25rem;
            backdrop-filter: blur(12px);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            text-decoration: none;
            color: inherit;
        }

        .card:hover {
            transform: translateY(-5px);
            border-color: var(--card-hover-border);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            background: rgba(30, 41, 59, 0.9);
        }

        .card-icon {
            width: 48px;
            height: 48px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 0.875rem;
            flex-shrink: 0;
        }

        .icon-py {
            background: rgba(234, 179, 8, 0.1);
            color: #facc15;
            border: 1px solid rgba(234, 179, 8, 0.2);
        }

        .icon-pdf {
            background: rgba(239, 68, 68, 0.1);
            color: #f87171;
            border: 1px solid rgba(239, 68, 68, 0.2);
        }

        .card-content {
            flex: 1;
            min-width: 0;
        }

        .card-title {
            font-size: 1rem;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 0.25rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .card-filename {
            font-size: 0.875rem;
            color: var(--text-secondary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            display: block;
        }

        .download-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.05);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-secondary);
            transition: all 0.2s ease;
            flex-shrink: 0;
        }

        .card:hover .download-btn {
            background: var(--primary-accent);
            color: white;
            transform: scale(1.1);
        }

        .no-results {
            text-align: center;
            grid-column: 1 / -1;
            color: var(--text-secondary);
            padding: 3rem 0;
            font-size: 1.125rem;
        }

        @media (max-width: 768px) {
            h1 { font-size: 2.5rem; }
            main { padding: 2rem 1rem; }
            .grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="bg-orb orb-1"></div>
    <div class="bg-orb orb-2"></div>

    <main>

        <div class="search-container">
            <svg class="search-icon" viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
            <input type="text" id="searchInput" class="search-input" placeholder="Search for practicals...">
        </div>

        <div class="tabs">
            <button class="tab-btn active" data-tab="ai">AI Practicals</button>
            <button class="tab-btn" data-tab="linux">Linux Practicals</button>
        </div>

        <section class="content-section">
            <div id="ai" class="tab-content active">
                <div class="grid" id="ai-grid"></div>
            </div>
            <div id="linux" class="tab-content">
                <div class="grid" id="linux-grid"></div>
            </div>
        </section>
    </main>

    <script>
        const aiFiles = [
            "8_puzzle_bfs.py",
            "8_puzzle_bfs_input.py",
            "8_puzzle_bfs_user_def.py",
            "8_puzzle_dfs.py",
            "8_puzzle_dfs_input.py",
            "8_puzzle_dfs_optimized.py",
            "8_puzzle_dfs_user_def.py",
            "a_star.py",
            "a_star_heuristic_input.py",
            "a_star_input.py",
            "family_relationships.py",
            "forward_backward_chaining.py",
            "goal_based_path.py",
            "goal_based_step_counter.py",
            "goal_based_user_input.py",
            "goal_based_validation.py",
            "hill_climbing_tsp.py",
            "minimax_tic_tac_toe.py",
            "unification_resolution.py",
            "user_defined_graph.py",
            "vacuum_agent_input.py",
            "vacuum_agent_simple.py",
            "vacuum_agent_three_rooms.py",
            "vacuum_agent_two_rooms.py"
        ];

        const linuxFiles = [
            "Linux_All_Practicals_Merged.pdf"
        ];

        function formatName(filename) {
            let name = filename.replace('.py', '').replace('.pdf', '');
            return name.split('_').map(w => w.charAt(0).toUpperCase() + w.slice(1)).join(' ');
        }

        function createCard(file, folder) {
            const isPdf = file.endsWith('.pdf');
            const iconClass = isPdf ? 'icon-pdf' : 'icon-py';
            const iconText = isPdf ? 'PDF' : 'PY';
            // URL encode folder names with spaces
            const encodedFolder = encodeURIComponent(folder);
            const encodedFile = encodeURIComponent(file);
            
            return `
                <a href="${encodedFolder}/${encodedFile}" download="${file}" class="card" data-name="${file.toLowerCase()}">
                    <div class="card-icon ${iconClass}">${iconText}</div>
                    <div class="card-content">
                        <h3 class="card-title">${formatName(file)}</h3>
                        <span class="card-filename">${file}</span>
                    </div>
                    <div class="download-btn">
                        <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                            <polyline points="7 10 12 15 17 10"></polyline>
                            <line x1="12" y1="15" x2="12" y2="3"></line>
                        </svg>
                    </div>
                </a>
            `;
        }

        function renderGrid(files, folder, gridId) {
            const grid = document.getElementById(gridId);
            grid.innerHTML = files.map(file => createCard(file, folder)).join('');
        }

        // Initialize grids
        renderGrid(aiFiles, 'AI PRAC', 'ai-grid');
        renderGrid(linuxFiles, 'LINUX PRAC', 'linux-grid');

        // Tab Switching
        const tabBtns = document.querySelectorAll('.tab-btn');
        const tabContents = document.querySelectorAll('.tab-content');

        tabBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                // Remove active class from all
                tabBtns.forEach(b => b.classList.remove('active'));
                tabContents.forEach(c => c.classList.remove('active'));
                
                // Add active class to clicked
                btn.classList.add('active');
                document.getElementById(btn.dataset.tab).classList.add('active');
            });
        });

        // Search Functionality
        const searchInput = document.getElementById('searchInput');
        
        searchInput.addEventListener('input', (e) => {
            const query = e.target.value.toLowerCase();
            const activeTab = document.querySelector('.tab-content.active');
            const cards = activeTab.querySelectorAll('.card');
            let hasResults = false;

            cards.forEach(card => {
                if (card.dataset.name.includes(query)) {
                    card.style.display = 'flex';
                    hasResults = true;
                } else {
                    card.style.display = 'none';
                }
            });

            // Handle no results
            let noResultsMsg = activeTab.querySelector('.no-results');
            if (!hasResults && !noResultsMsg) {
                activeTab.querySelector('.grid').insertAdjacentHTML('afterend', '<div class="no-results">No practicals found matching your search.</div>');
            } else if (hasResults && noResultsMsg) {
                noResultsMsg.remove();
            }
        });
    </script>
</body>
</html>
