<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Saloni Ma'am Mini Project</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Outfit', sans-serif;
            background-color: #0f172a;
            color: #f8fafc;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-image: 
                radial-gradient(circle at 50% 50%, rgba(59, 130, 246, 0.15) 0%, transparent 50%);
        }
        .app-container {
            background: rgba(30, 41, 59, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 3rem;
            text-align: center;
            max-width: 500px;
            backdrop-filter: blur(10px);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
        h1 {
            background: linear-gradient(to right, #60a5fa, #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-size: 2.5rem;
            margin-top: 0;
        }
        p {
            color: #94a3b8;
            margin-bottom: 2rem;
            line-height: 1.6;
        }
        .interactive-btn {
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            color: white;
            border: none;
            padding: 1rem 2rem;
            border-radius: 50px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            font-family: 'Outfit', sans-serif;
        }
        .interactive-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px -10px #3b82f6;
        }
        #result {
            margin-top: 1.5rem;
            font-size: 1.2rem;
            font-weight: 600;
            color: #10b981;
            min-height: 1.5rem;
        }
        .back-link {
            display: block; 
            margin-top: 2rem; 
            color: #60a5fa; 
            text-decoration: none;
            transition: color 0.2s;
        }
        .back-link:hover {
            color: #93c5fd;
        }
    </style>
</head>
<body>

<div class="app-container">
    <h1>WDJ Mini Dashboard</h1>
    <p>This is a sample interactive dashboard that integrates the concepts learned in Saloni Ma'am's practicals, serving as a frontend template for Spring Boot API connections.</p>
    
    <button class="interactive-btn" onclick="fetchStudentData()">Simulate API Call</button>
    <div id="result"></div>
    
    <a href="../index.html" class="back-link">&larr; Back to Practicals Index</a>
</div>

<script>
    function fetchStudentData() {
        const resultDiv = document.getElementById('result');
        resultDiv.style.color = '#eab308';
        resultDiv.innerText = 'Fetching data...';
        
        setTimeout(() => {
            resultDiv.style.color = '#10b981';
            resultDiv.innerText = 'Success! User: Admin | Role: Student Manager';
        }, 800);
    }
</script>

</body>
</html>
